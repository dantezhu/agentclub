<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Agent Club - 管理后台</title>
    <style>
        /* Design tokens — kept in sync with static/css/style.css. Inline
           here so admin.html can be served standalone without the chat
           stylesheet. */
        :root {
            --color-primary: #3370FF;
            --color-primary-hover: #1d5dff;
            --color-primary-soft: #eef2ff;
            --color-danger: #ff4757;
            --color-text: #1a1a2e;
            --avatar-fallback: #5E6AD2;
        }
        .icon {
            display: inline-block;
            width: 1.05em;
            height: 1.05em;
            vertical-align: -0.18em;
            stroke: currentColor;
            fill: none;
            pointer-events: none;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f0f2f5;
            color: #1a1a2e;
        }
        .brand-mark {
            width: 26px; height: 26px; border-radius: 7px;
            background: var(--color-primary); color: #fff;
            font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
            display: inline-flex; align-items: center; justify-content: center;
            box-shadow: 0 1px 2px rgba(51,112,255,0.25);
            flex-shrink: 0;
        }
        .topbar {
            background: #fff;
            border-bottom: 1px solid #eee;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        /* h1 is flex too so the brand mark and the title sit on the
         * same horizontal centerline regardless of font metrics. The
         * older `vertical-align: -5px` hack on .brand-mark drifted by
         * ~2px in Chrome vs Safari and looked obviously off. */
        .topbar h1 {
            font-size: 18px;
            color: var(--color-text);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            line-height: 1;
        }
        .topbar a {
            color: var(--color-primary);
            text-decoration: none;
            font-size: 14px;
        }
        .topbar a:hover { text-decoration: underline; }
        .container {
            max-width: 800px;
            margin: 24px auto;
            padding: 0 20px;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            padding: 24px;
            margin-bottom: 20px;
        }
        .card h2 {
            font-size: 16px;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
            color: #333;
        }
        .inline-form {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .inline-form input {
            flex: 1;
            min-width: 120px;
            padding: 10px 14px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }
        .inline-form input:focus { border-color: var(--color-primary); }
        /* Bump input font-size to 16px on touch screens so iOS Safari
           doesn't auto-zoom the whole page when the user focuses a form. */
        @media (max-width: 768px) {
            .inline-form input { font-size: 16px; }
        }
        .btn {
            padding: 10px 18px;
            background: var(--color-primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn:hover { opacity: 0.9; }
        .btn.danger { background: #ff4757; }
        .btn.sm { padding: 6px 14px; font-size: 13px; }
        /* Inline avatar picker inside the "create Agent" form: the label
           toggles between a plain "头像" prompt (with an image icon) and
           a thumbnail once a file has been selected, so admins get
           immediate visual confirmation their upload went through. */
        .avatar-picker { display: inline-flex; align-items: center; gap: 6px; }
        .avatar-picker img {
            width: 22px; height: 22px; border-radius: 50%;
            object-fit: cover; display: block;
        }
        .agent-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 8px;
            background: #f8f9fa;
            margin-bottom: 8px;
        }
        .agent-avatar {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--avatar-fallback);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
            flex-shrink: 0;
            overflow: hidden;
            cursor: pointer;
        }
        .agent-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .agent-info { flex: 1; min-width: 0; }
        .agent-info .name { font-size: 14px; font-weight: 500; }
        .agent-info .token {
            font-size: 11px;
            color: #999;
            font-family: monospace;
            word-break: break-all;
            margin-top: 2px;
        }
        .online-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2ed573;
            display: inline-block;
            margin-right: 4px;
        }
        .empty { color: #999; font-size: 13px; padding: 8px 0; }

        /* Edit-agent modal: same shape as the chat-side "个人设置" modal so
           admins get a familiar pattern (centered overlay, large round
           avatar with an upload button under it, single name input,
           full-width save button). Hidden by default; .visible swaps it on. */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 16px;
        }
        .modal-overlay.visible { display: flex; }
        .modal-box {
            background: #fff;
            border-radius: 12px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .modal-head {
            padding: 14px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .modal-head h3 { font-size: 15px; color: #333; }
        .modal-close {
            background: none;
            border: none;
            font-size: 18px;
            color: #999;
            cursor: pointer;
            line-height: 1;
        }
        .modal-body { padding: 20px; }
        .modal-avatar-row { text-align: center; margin-bottom: 20px; }
        .modal-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--avatar-fallback);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 600;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .modal-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .modal-field { margin-bottom: 16px; }
        .modal-field label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 6px;
        }
        .modal-field input {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }
        .modal-field input:focus { border-color: var(--color-primary); }
        .modal-save {
            width: 100%;
            padding: 11px;
            background: var(--color-primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        .modal-save:hover { opacity: 0.9; }
        .modal-save:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ── Top-right user menu ──
         * Replaces the old "返回聊天" link. The trigger is a circular
         * avatar (initial or uploaded image); clicking opens a small
         * dropdown with: chat shortcut, profile (TODO), and logout.
         * Same shape used by GitHub/Vercel/Linear so the affordance is
         * familiar without explanation. */
        .user-menu { position: relative; }
        .user-menu-trigger {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: none;
            border: none;
            padding: 4px 8px 4px 4px;
            border-radius: 999px;
            cursor: pointer;
            color: #666;
            transition: background 0.15s;
        }
        .user-menu-trigger:hover { background: #f0f2f5; }
        .user-menu-trigger .menu-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--avatar-fallback);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            overflow: hidden;
            flex-shrink: 0;
        }
        .user-menu-trigger .menu-avatar img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .user-menu-trigger .menu-caret {
            width: 14px; height: 14px;
            stroke: currentColor; fill: none; stroke-width: 2;
            stroke-linecap: round; stroke-linejoin: round;
            transition: transform 0.15s;
        }
        .user-menu.open .menu-caret { transform: rotate(180deg); }
        .user-menu-dropdown {
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            min-width: 200px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.04);
            padding: 6px;
            z-index: 500;
            display: none;
        }
        .user-menu.open .user-menu-dropdown { display: block; }
        .user-menu-info {
            padding: 10px 12px 12px;
            border-bottom: 1px solid #f0f0f0;
            margin-bottom: 6px;
        }
        .user-menu-info .name {
            font-size: 14px; font-weight: 600; color: var(--color-text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .user-menu-info .username {
            font-size: 12px; color: #999; margin-top: 2px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .user-menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 9px 12px;
            background: none;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            color: var(--color-text);
            cursor: pointer;
            text-align: left;
        }
        .user-menu-item:hover,
        .user-menu-item:focus {
            background: #f5f5f7;
            outline: none;
        }
        .user-menu-item.danger { color: var(--color-danger); }
        .user-menu-item.danger:hover { background: #fff0f0; }
        .user-menu-item .icon { width: 16px; height: 16px; flex-shrink: 0; }

        @media (max-width: 640px) {
            .topbar { padding: 12px 16px; }
            .topbar h1 { font-size: 16px; }
            .container { margin: 16px auto; padding: 0 12px; }
            .card { padding: 16px; border-radius: 10px; }
            .btn { padding: 10px 14px; }
            .agent-item { flex-wrap: wrap; }
        }
    </style>
    <script src="/static/js/ui-kit.js"></script>
</head>
<body>
    <div class="topbar">
        <h1><span class="brand-mark" aria-hidden="true">AC</span>管理后台</h1>
        <div class="user-menu" id="userMenu">
            <button class="user-menu-trigger" id="userMenuTrigger"
                    onclick="toggleUserMenu(event)" aria-haspopup="menu"
                    aria-expanded="false" type="button">
                <span class="menu-avatar" id="userMenuAvatar"></span>
                <!-- Inline caret kept separate from the .icon class so its
                     rotation transform doesn't fight the universal icon
                     stroke rules. -->
                <svg class="menu-caret" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="m6 9 6 6 6-6"/>
                </svg>
            </button>
            <div class="user-menu-dropdown" role="menu">
                <div class="user-menu-info">
                    <div class="name" id="userMenuName"></div>
                    <div class="username" id="userMenuUsername"></div>
                </div>
                <!-- Use <button> for both items so they share the same
                     hover/focus rules. The earlier <a> for /chat got
                     re-underlined by the .topbar a:hover rule above
                     (specificity beat .user-menu-item:hover). -->
                <button class="user-menu-item" type="button" role="menuitem"
                        onclick="window.location.href='/chat'"
                        data-icon="message-square">聊天</button>
                <button class="user-menu-item danger" type="button"
                        role="menuitem" onclick="handleLogout()"
                        data-icon="log-out">退出登录</button>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Agent Management -->
        <div class="card">
            <h2>Agent 管理</h2>
            <div class="inline-form">
                <input type="text" id="newAgentUsername" placeholder="用户名">
                <input type="text" id="newAgentDisplayName" placeholder="显示名称（选填）">
                <label class="btn avatar-picker" id="agentAvatarLabel" style="cursor:pointer">
                    <img id="agentAvatarPreview" style="display:none" alt="">
                    <span id="agentAvatarLabelText" data-icon="image" style="display:inline-flex;align-items:center;gap:4px">头像</span>
                    <input type="file" accept="image/*" id="agentAvatarFile" style="display:none" onchange="handleAgentAvatarSelect(event)">
                </label>
                <button class="btn" onclick="createAgent()">创建 Agent</button>
            </div>
            <input type="hidden" id="agentAvatarUrl" value="">
            <div id="agentList"></div>
        </div>
    </div>

    <!-- Edit-agent modal: identical shape to chat.html's "个人设置" so admins
         get a familiar pattern. Holds avatar + display_name; one Save click
         PUTs both at once. -->
    <div class="modal-overlay" id="editAgentModal">
        <div class="modal-box">
            <div class="modal-head">
                <h3>编辑 Agent</h3>
                <button class="modal-close" onclick="closeEditAgent()" data-icon="x" title="关闭"></button>
            </div>
            <div class="modal-body">
                <div class="modal-avatar-row">
                    <div class="modal-avatar" id="editAgentAvatar"></div>
                    <div>
                        <label class="btn sm" style="cursor:pointer">
                            更换头像
                            <input type="file" accept="image/*" style="display:none"
                                   onchange="uploadEditAgentAvatar(event)">
                        </label>
                    </div>
                </div>
                <div class="modal-field">
                    <label>用户名</label>
                    <input type="text" id="editAgentUsername" disabled
                           style="background:#f8f9fa;color:#999">
                </div>
                <div class="modal-field">
                    <label>显示名称</label>
                    <input type="text" id="editAgentDisplayName">
                </div>
                <button class="modal-save" id="editAgentSaveBtn"
                        onclick="saveEditAgent()">保存</button>
            </div>
        </div>
    </div>

    <script>
    let currentUser = null;
    // Cache of the most recent /api/agents response. Indexed lookups
    // (editAgent etc.) read from here instead of round-tripping through
    // onclick string args, so display_name/avatar can contain anything
    // without HTML-injection worry.
    let agentsById = {};
    // Pending edit-modal state. avatar starts equal to the agent's current
    // value and only mutates after a successful upload.
    let editingAgent = null;
    let editingAvatar = '';

    async function init() {
        const res = await fetch('/api/me');
        if (!res.ok) { window.location.href = '/'; return; }
        currentUser = await res.json();
        renderUserMenu();
        if (currentUser.role !== 'admin') {
            document.querySelector('.container').innerHTML = '<div class="card"><p style="text-align:center;padding:40px;color:#999">需要管理员权限</p></div>';
            return;
        }
        await loadAgents();
    }

    /* ── Top-right user menu ──
     * Populated from /api/me. Click trigger to toggle; click anywhere
     * outside or press Escape to close. Same pattern as the chat-side
     * sidebar menu, kept lightweight so we don't pull in a popover lib. */
    function renderUserMenu() {
        const avatar = document.getElementById('userMenuAvatar');
        const name = currentUser.display_name || currentUser.username || '?';
        if (currentUser.avatar) {
            avatar.innerHTML = `<img src="${esc(currentUser.avatar)}">`;
            avatar.style.background = '';
        } else {
            avatar.textContent = name.charAt(0);
            avatar.style.background = AgentClubUI.avatarColor(name);
        }
        document.getElementById('userMenuName').textContent = name;
        document.getElementById('userMenuUsername').textContent =
            '@' + currentUser.username;
    }

    function toggleUserMenu(e) {
        e.stopPropagation();
        const menu = document.getElementById('userMenu');
        const open = menu.classList.toggle('open');
        document.getElementById('userMenuTrigger')
            .setAttribute('aria-expanded', open ? 'true' : 'false');
    }

    function closeUserMenu() {
        const menu = document.getElementById('userMenu');
        if (!menu.classList.contains('open')) return;
        menu.classList.remove('open');
        document.getElementById('userMenuTrigger')
            .setAttribute('aria-expanded', 'false');
    }

    document.addEventListener('click', (e) => {
        const menu = document.getElementById('userMenu');
        if (menu && !menu.contains(e.target)) closeUserMenu();
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeUserMenu();
    });

    async function handleLogout() {
        try {
            await fetch('/api/logout', { method: 'POST' });
        } finally {
            window.location.href = '/';
        }
    }

    async function loadAgents() {
        const res = await fetch('/api/agents');
        const agents = await res.json();
        agentsById = {};
        for (const a of agents) agentsById[a.id] = a;
        if (!agents.length) {
            document.getElementById('agentList').innerHTML = '<div class="empty">暂无 Agent</div>';
            return;
        }
        let html = '';
        for (const a of agents) {
            const dot = a.is_online ? '<span class="online-dot"></span>' : '';
            const initial = (a.display_name || '?').charAt(0);
            const avatar = a.avatar
                ? `<img src="${esc(a.avatar)}">`
                : initial;
            const avatarStyle = a.avatar
                ? ''
                : ` style="${AgentClubUI.avatarStyle(a.display_name || a.username || a.id)}"`;
            html += `<div class="agent-item">
                <div class="agent-avatar"${avatarStyle}>${avatar}</div>
                <div class="agent-info">
                    <div class="name">${dot}${esc(a.display_name)} <span style="color:#999;font-weight:400">(${esc(a.username)})</span></div>
                    <div class="token">Token: ${esc(a.agent_token)}</div>
                </div>
                <button class="btn sm" onclick="editAgent('${a.id}')">编辑</button>
                <button class="btn sm danger" onclick="deleteAgent('${a.id}','${esc(a.display_name)}')">删除</button>
            </div>`;
        }
        document.getElementById('agentList').innerHTML = html;
    }

    /* The picker label has three visual states:
     *   default → "<image-icon> 头像"
     *   pending → "<spinner-icon> 上传中"
     *   done    → "已选"
     * Centralised here so the inline JS doesn't need to remember the
     * exact icon names. */
    function setPickerLabel(state) {
        const el = document.getElementById('agentAvatarLabelText');
        if (state === 'pending') {
            el.innerHTML = AgentClubUI.iconHTML('loader') + ' 上传中';
        } else if (state === 'done') {
            el.textContent = '已选';
        } else {
            el.innerHTML = AgentClubUI.iconHTML('image') + ' 头像';
        }
    }

    function resetAgentAvatarPicker() {
        document.getElementById('agentAvatarUrl').value = '';
        // Clearing the file input's value is important: otherwise picking
        // the *same* file a second time doesn't fire ``onchange`` and the
        // preview silently goes stale.
        document.getElementById('agentAvatarFile').value = '';
        const preview = document.getElementById('agentAvatarPreview');
        preview.style.display = 'none';
        preview.src = '';
        setPickerLabel('default');
    }

    async function handleAgentAvatarSelect(event) {
        const file = event.target.files[0];
        if (!file) return;
        const preview = document.getElementById('agentAvatarPreview');
        // Immediate feedback while the upload is in flight — before this
        // fix the label stayed on the default text through the whole
        // request and admins couldn't tell whether the file had even
        // been registered.
        setPickerLabel('pending');
        try {
            const formData = new FormData();
            formData.append('file', file);
            const res = await fetch('/api/upload', { method: 'POST', body: formData });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.error || '上传失败');
            }
            const data = await res.json();
            document.getElementById('agentAvatarUrl').value = data.url;
            preview.src = data.url;
            preview.style.display = '';
            setPickerLabel('done');
        } catch (err) {
            alert(err.message);
            resetAgentAvatarPicker();
        }
    }

    async function createAgent() {
        const username = document.getElementById('newAgentUsername').value.trim();
        const displayName = document.getElementById('newAgentDisplayName').value.trim();
        const avatar = document.getElementById('agentAvatarUrl').value;
        if (!username) { alert('请输入用户名'); return; }
        const res = await fetch('/api/agents', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username, display_name: displayName || username, avatar }),
        });
        if (res.ok) {
            const data = await res.json();
            showTokenDialog(data.agent_token);
            document.getElementById('newAgentUsername').value = '';
            document.getElementById('newAgentDisplayName').value = '';
            resetAgentAvatarPicker();
            loadAgents();
        } else {
            const data = await res.json();
            alert(data.error || '创建失败');
        }
    }

    function renderEditAgentAvatar() {
        const el = document.getElementById('editAgentAvatar');
        if (editingAvatar) {
            el.innerHTML = `<img src="${esc(editingAvatar)}">`;
            el.style.background = '';
        } else {
            const fullName = (
                document.getElementById('editAgentDisplayName').value
                || editingAgent?.display_name
                || editingAgent?.username
                || '?'
            );
            el.textContent = fullName.charAt(0);
            el.style.background = AgentClubUI.avatarColor(fullName);
        }
    }

    function editAgent(agentId) {
        const a = agentsById[agentId];
        if (!a) return;
        editingAgent = a;
        editingAvatar = a.avatar || '';
        document.getElementById('editAgentUsername').value = a.username;
        document.getElementById('editAgentDisplayName').value = a.display_name || '';
        renderEditAgentAvatar();
        document.getElementById('editAgentModal').classList.add('visible');
    }

    function closeEditAgent() {
        document.getElementById('editAgentModal').classList.remove('visible');
        editingAgent = null;
        editingAvatar = '';
    }

    async function uploadEditAgentAvatar(event) {
        const file = event.target.files[0];
        if (!file) return;
        // Reset input so picking the same file twice still fires onchange.
        event.target.value = '';
        const formData = new FormData();
        formData.append('file', file);
        const res = await fetch('/api/upload', { method: 'POST', body: formData });
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            alert(err.error || '上传失败');
            return;
        }
        const data = await res.json();
        editingAvatar = data.url;
        renderEditAgentAvatar();
    }

    async function saveEditAgent() {
        if (!editingAgent) return;
        const displayName = document.getElementById('editAgentDisplayName').value.trim();
        if (!displayName) { alert('显示名称不能为空'); return; }
        const btn = document.getElementById('editAgentSaveBtn');
        btn.disabled = true;
        btn.textContent = '保存中…';
        try {
            const res = await fetch(`/api/agents/${editingAgent.id}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    display_name: displayName,
                    avatar: editingAvatar,
                }),
            });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                alert(err.error || '保存失败');
                return;
            }
            closeEditAgent();
            await loadAgents();
        } finally {
            btn.disabled = false;
            btn.textContent = '保存';
        }
    }

    async function deleteAgent(agentId, name) {
        if (!confirm(`确定要删除 Agent "${name}" 吗？`)) return;
        const res = await fetch(`/api/agents/${agentId}`, { method: 'DELETE' });
        if (res.ok) loadAgents();
        else alert('删除失败');
    }

    function showTokenDialog(token) {
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:999';
        overlay.innerHTML = `<div style="background:#fff;border-radius:12px;padding:24px;max-width:480px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.2);position:relative">
            <button onclick="this.closest('div[style]').parentElement.remove()" style="position:absolute;top:12px;right:12px;background:none;border:none;cursor:pointer;color:#999;display:inline-flex;padding:4px">${AgentClubUI.iconHTML('x')}</button>
            <h3 style="margin-bottom:6px;font-size:16px">Agent 创建成功</h3>
            <p style="font-size:13px;color:#999;margin-bottom:16px">以下是该 Agent 的连接 Token，请妥善保存。</p>
            <div style="display:flex;gap:8px">
                <input readonly value="${esc(token)}" style="flex:1;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-family:monospace;font-size:13px;outline:none;background:#f8f9fa" onclick="this.select()">
                <button class="btn" onclick="navigator.clipboard.writeText('${esc(token)}');this.textContent='已复制';setTimeout(()=>this.textContent='复制',1500)">复制</button>
            </div>
        </div>`;
        document.body.appendChild(overlay);
    }

    function esc(str) {
        if (!str) return '';
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
    }

    init();
    </script>
</body>
</html>
