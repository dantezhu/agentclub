<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#3370FF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>{{ site_name }}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Code highlighting -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <!-- Shared UI primitives (icons + avatar palette). Loaded before
         chat.js so AgentClubUI is in scope. -->
    <script src="/static/js/ui-kit.js"></script>
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <h2>
                    <span class="brand-mark" aria-hidden="true">{% if site_logo %}<img src="{{ site_logo }}" alt="">{% else %}{{ site_logo_text }}{% endif %}</span>
                    {{ site_name }}
                </h2>
                <button class="icon-btn" id="menuBtn" title="菜单" data-icon="plus"></button>
            </div>
            <div class="sidebar-menu hidden" id="sidebarMenu">
                <button onclick="showNewChatModal()">发起私聊</button>
                <button onclick="showCreateGroupModal()">创建群组</button>
                <button onclick="window.location.href='/admin'" id="adminLink">管理后台</button>
                <button onclick="showProfileModal()">个人设置</button>
                <button onclick="handleLogout()">退出登录</button>
            </div>
            <div class="chat-list" id="chatList"></div>
        </aside>

        <!-- Mobile overlay: closes whichever drawer (sidebar / members) is open. -->
        <div class="overlay hidden" id="overlay" onclick="handleOverlayClick()"></div>

        <!-- Main chat area -->
        <main id="mainArea">
            <div class="empty-state" id="emptyState">
                <button class="icon-btn mobile-only empty-menu-btn" onclick="toggleSidebar()" title="打开菜单" data-icon="menu"></button>
                <div class="empty-icon" data-icon="message-square"></div>
                <p>选择一个对话开始聊天</p>
            </div>

            <div class="chat-container hidden" id="chatContainer">
                <div class="chat-header" id="chatHeader">
                    <button class="icon-btn mobile-only" onclick="toggleSidebar()" title="菜单" data-icon="menu"></button>
                    <div class="chat-header-avatar hidden" id="chatHeaderAvatar"></div>
                    <div class="chat-header-info">
                        <h3 id="chatTitle"></h3>
                        <span id="chatSubtitle" class="subtitle"></span>
                    </div>
                    <!-- Chat actions kebab. Sits to the left of the members
                         button for groups, and is the only header action for
                         direct chats (where the members button is hidden).
                         Replaces the desktop-only right-click context menu
                         on mobile, where there is no rightclick. Items are
                         decided at click time: direct=删除会话; group member=
                         退出群组; group creator=群组设置 + 解散群组. -->
                    <button class="icon-btn hidden" id="chatActionsBtn" onclick="showChatActionsMenu(event)" title="更多" aria-label="更多操作" data-icon="more-horizontal"></button>
                    <button class="icon-btn" id="chatMembersBtn" onclick="toggleMembers()" title="成员" data-icon="users"></button>
                </div>

                <div class="messages-area" id="messagesArea">
                    <button class="load-more hidden" id="loadMoreBtn" onclick="loadMoreMessages()">加载更多消息</button>
                    <div id="messageList"></div>
                    <div class="typing-indicator hidden" id="typingIndicator"></div>
                </div>

                <div class="input-area" id="inputArea">
                    <div class="image-preview-bar hidden" id="imagePreviewBar">
                        <div class="image-preview-list" id="imagePreviewList"></div>
                    </div>
                    <div class="input-toolbar">
                        <label class="icon-btn" title="发送图片" data-icon="image">
                            <input type="file" id="imageInput" accept="image/*" multiple style="display:none" onchange="handleImageSelect(event)">
                        </label>
                        <label class="icon-btn" title="发送文件" data-icon="paperclip">
                            <input type="file" id="fileInput" style="display:none" onchange="handleFileSelect(event)">
                        </label>
                    </div>
                    <div class="input-row">
                        <div id="messageInput"
                             contenteditable="true"
                             role="textbox"
                             aria-multiline="true"
                             enterkeyhint="send"
                             data-placeholder="输入消息... (Enter 发送, Shift+Enter 换行, @ 提到成员)"></div>
                        <button class="send-btn" onclick="sendMessage()">发送</button>
                    </div>
                    <div class="mention-picker hidden" id="mentionPicker"></div>
                </div>
            </div>

            <!-- Members panel -->
            <div class="members-panel hidden" id="membersPanel">
                <div class="members-header">
                    <h3>成员</h3>
                    <div class="members-header-actions">
                        <!-- Manage actions (添加成员 / 群组设置) injected here
                             by renderMembersPanel() when the viewer can
                             manage the group; sitting next to the close X
                             keeps the row compact and avoids stealing space
                             from the member list below. -->
                        <span id="membersHeaderActions"></span>
                        <button class="icon-btn" onclick="toggleMembers()" data-icon="x" title="关闭"></button>
                    </div>
                </div>
                <div id="membersList"></div>
            </div>
        </main>
    </div>

    <!-- Profile modal -->
    <div class="modal hidden" id="profileModal">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h3>个人设置</h3>
                <button class="icon-btn" onclick="closeModal('profileModal')" data-icon="x" title="关闭"></button>
            </div>
            <div class="modal-body">
                <div style="text-align:center;margin-bottom:20px">
                    <div class="profile-avatar" id="profileAvatar"></div>
                    <label class="btn-sm ghost" style="display:inline-block;margin-top:10px;cursor:pointer">
                        更换头像 <input type="file" accept="image/*" style="display:none" onchange="uploadAvatar(event)">
                    </label>
                </div>
                <div class="form-group" style="margin-bottom:16px">
                    <label style="display:block;font-size:13px;color:#555;margin-bottom:6px">显示名称</label>
                    <input type="text" id="profileDisplayName" style="width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:16px;outline:none">
                </div>
                <button class="btn-sm" style="width:100%;padding:10px" onclick="saveProfile()">保存</button>
            </div>
        </div>
    </div>

    <!-- Group settings modal: a single overlay reused for both
         "create new group" (sidebar + button → showCreateGroupModal)
         and "edit existing group" (members panel → openGroupSettings).
         The two flows differ only in the modal title, the save button
         label, and whether the save handler does POST or PUT. We keep
         them in one modal so the avatar / name UX is identical. -->
    <div class="modal hidden" id="groupSettingsModal">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h3 id="groupSettingsTitle">群组设置</h3>
                <button class="icon-btn" onclick="closeModal('groupSettingsModal')" data-icon="x" title="关闭"></button>
            </div>
            <div class="modal-body">
                <div style="text-align:center;margin-bottom:20px">
                    <div class="profile-avatar" id="groupSettingsAvatar"></div>
                    <label class="btn-sm ghost" style="display:inline-block;margin-top:10px;cursor:pointer">
                        更换头像 <input type="file" accept="image/*" style="display:none" onchange="uploadGroupSettingsAvatar(event)">
                    </label>
                </div>
                <div class="form-group" style="margin-bottom:16px">
                    <label style="display:block;font-size:13px;color:#555;margin-bottom:6px">群组名称</label>
                    <input type="text" id="groupSettingsName" placeholder="例如：产品讨论组" style="width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:16px;outline:none">
                </div>
                <div class="form-group" style="margin-bottom:16px">
                    <label style="display:block;font-size:13px;color:#555;margin-bottom:6px">群组描述（选填）</label>
                    <input type="text" id="groupSettingsDescription" maxlength="200" placeholder="一句话介绍这个群" style="width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:16px;outline:none">
                </div>
                <button class="btn-sm" id="groupSettingsSaveBtn" style="width:100%;padding:10px" onclick="saveGroupSettings()">保存</button>
            </div>
        </div>
    </div>

    <!-- New direct chat modal -->
    <div class="modal hidden" id="newChatModal">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h3>发起私聊</h3>
                <button class="icon-btn" onclick="closeModal('newChatModal')" data-icon="x" title="关闭"></button>
            </div>
            <div class="modal-body" id="newChatUserList"></div>
        </div>
    </div>

    <!-- Profile view modal — read-only "who is this person" card.
         Opened from: chat-header avatar in direct chats, message author
         avatars (skipped for self), group members kebab "查看信息" item.
         Bottom action lets the viewer jump straight into a 1:1 chat
         with the displayed user. -->
    <div class="modal hidden" id="profileViewModal">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h3>个人信息</h3>
                <button class="icon-btn" onclick="closeModal('profileViewModal')" data-icon="x" title="关闭"></button>
            </div>
            <div class="modal-body">
                <div class="profile-view">
                    <div class="profile-avatar" id="profileViewAvatar"></div>
                    <div class="profile-view-name" id="profileViewName"></div>
                    <div class="profile-view-username" id="profileViewUsername"></div>
                    <div class="profile-view-tags" id="profileViewTags"></div>
                    <div class="profile-view-desc" id="profileViewDesc"></div>
                </div>
                <div class="profile-view-actions">
                    <button class="btn-sm" id="profileViewChatBtn"
                            onclick="startChatFromProfile()">发起私聊</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Group info modal — read-only "what is this group" card. Opened
         by clicking the group chat-header avatar. Reuses the same
         .profile-view styles as the user profile modal so the two
         info cards (人/群) feel like siblings. No bottom CTA — group
         management still lives in the members panel ("群组设置" / 添加
         成员), this is purely informational. -->
    <div class="modal hidden" id="groupInfoModal">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h3>群组信息</h3>
                <button class="icon-btn" onclick="closeModal('groupInfoModal')" data-icon="x" title="关闭"></button>
            </div>
            <div class="modal-body">
                <div class="profile-view">
                    <div class="profile-avatar" id="groupInfoAvatar"></div>
                    <div class="profile-view-name" id="groupInfoName"></div>
                    <div class="profile-view-tags" id="groupInfoTags"></div>
                    <div class="profile-view-desc" id="groupInfoDesc"></div>
                    <div class="profile-view-meta" id="groupInfoMeta"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add member modal -->
    <div class="modal hidden" id="addMemberModal">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h3>添加成员</h3>
                <button class="icon-btn" onclick="closeModal('addMemberModal')" data-icon="x" title="关闭"></button>
            </div>
            <div class="modal-body">
                <div id="addMemberUserList"></div>
            </div>
        </div>
    </div>

    <!-- Context menu -->
    <div class="context-menu hidden" id="contextMenu"></div>

    <!-- Image lightbox -->
    <div class="lightbox hidden" id="lightbox" onclick="closeLightbox(event)">
        <button class="lightbox-close" onclick="closeLightbox()" data-icon="x" title="关闭"></button>
        <img id="lightboxImg" src="" alt="">
    </div>

    <!-- Drag-drop overlay -->
    <div class="drop-overlay hidden" id="dropOverlay">
        <div class="drop-hint">
            <div class="drop-icon" data-icon="image"></div>
            <div>松开鼠标发送图片</div>
        </div>
    </div>

    <script src="/static/js/chat.js"></script>
</body>
</html>
