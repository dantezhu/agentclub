<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Agent Club</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Code highlighting -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <h2>Agent Club</h2>
                <button class="icon-btn" id="menuBtn" title="菜单">☰</button>
            </div>
            <div class="sidebar-menu hidden" id="sidebarMenu">
                <button onclick="showNewChatModal()">发起私聊</button>
                <button onclick="showCreateGroupModal()">创建群组</button>
                <button onclick="window.location.href='/admin'" id="adminLink">管理后台</button>
                <button onclick="showProfileModal()">个人设置</button>
                <button onclick="handleLogout()">退出登录</button>
            </div>
            <div class="chat-list" id="chatList"></div>
        </aside>

        <!-- Mobile overlay: closes whichever drawer (sidebar / members) is open. -->
        <div class="overlay hidden" id="overlay" onclick="handleOverlayClick()"></div>

        <!-- Main chat area -->
        <main id="mainArea">
            <div class="empty-state" id="emptyState">
                <button class="icon-btn mobile-only empty-menu-btn" onclick="toggleSidebar()" title="打开菜单">☰</button>
                <div class="empty-icon">💬</div>
                <p>选择一个对话开始聊天</p>
            </div>

            <div class="chat-container hidden" id="chatContainer">
                <div class="chat-header" id="chatHeader">
                    <button class="icon-btn mobile-only" onclick="toggleSidebar()" title="菜单">☰</button>
                    <div class="chat-header-avatar hidden" id="chatHeaderAvatar"></div>
                    <div class="chat-header-info">
                        <h3 id="chatTitle"></h3>
                        <span id="chatSubtitle" class="subtitle"></span>
                    </div>
                    <button class="icon-btn" id="chatMembersBtn" onclick="toggleMembers()" title="成员">👥</button>
                </div>

                <div class="messages-area" id="messagesArea">
                    <button class="load-more hidden" id="loadMoreBtn" onclick="loadMoreMessages()">加载更多消息</button>
                    <div id="messageList"></div>
                    <div class="typing-indicator hidden" id="typingIndicator"></div>
                </div>

                <div class="input-area" id="inputArea">
                    <div class="image-preview-bar hidden" id="imagePreviewBar">
                        <div class="image-preview-list" id="imagePreviewList"></div>
                    </div>
                    <div class="input-toolbar">
                        <label class="icon-btn" title="发送图片">
                            🖼️ <input type="file" id="imageInput" accept="image/*" multiple style="display:none" onchange="handleImageSelect(event)">
                        </label>
                        <label class="icon-btn" title="发送文件">
                            📎 <input type="file" id="fileInput" style="display:none" onchange="handleFileSelect(event)">
                        </label>
                    </div>
                    <div class="input-row">
                        <div id="messageInput"
                             contenteditable="true"
                             role="textbox"
                             aria-multiline="true"
                             data-placeholder="输入消息... (Enter 发送, Shift+Enter 换行, @ 提到成员)"></div>
                        <button class="send-btn" onclick="sendMessage()">发送</button>
                    </div>
                    <div class="mention-picker hidden" id="mentionPicker"></div>
                </div>
            </div>

            <!-- Members panel -->
            <div class="members-panel hidden" id="membersPanel">
                <div class="members-header">
                    <h3>成员</h3>
                    <button class="icon-btn" onclick="toggleMembers()">✕</button>
                </div>
                <div id="membersList"></div>
            </div>
        </main>
    </div>

    <!-- Profile modal -->
    <div class="modal hidden" id="profileModal">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h3>个人设置</h3>
                <button class="icon-btn" onclick="closeModal('profileModal')">✕</button>
            </div>
            <div class="modal-body">
                <div style="text-align:center;margin-bottom:20px">
                    <div class="profile-avatar" id="profileAvatar"></div>
                    <label class="btn-sm" style="display:inline-block;margin-top:10px;cursor:pointer">
                        更换头像 <input type="file" accept="image/*" style="display:none" onchange="uploadAvatar(event)">
                    </label>
                </div>
                <div class="form-group" style="margin-bottom:16px">
                    <label style="display:block;font-size:13px;color:#555;margin-bottom:6px">显示名称</label>
                    <input type="text" id="profileDisplayName" style="width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:16px;outline:none">
                </div>
                <button class="btn-sm" style="width:100%;padding:10px" onclick="saveProfile()">保存</button>
            </div>
        </div>
    </div>

    <!-- New direct chat modal -->
    <div class="modal hidden" id="newChatModal">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h3>发起私聊</h3>
                <button class="icon-btn" onclick="closeModal('newChatModal')">✕</button>
            </div>
            <div class="modal-body" id="newChatUserList"></div>
        </div>
    </div>

    <!-- Add member modal -->
    <div class="modal hidden" id="addMemberModal">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h3>添加成员</h3>
                <button class="icon-btn" onclick="closeModal('addMemberModal')">✕</button>
            </div>
            <div class="modal-body">
                <div id="addMemberUserList"></div>
            </div>
        </div>
    </div>

    <!-- Context menu -->
    <div class="context-menu hidden" id="contextMenu"></div>

    <!-- Image lightbox -->
    <div class="lightbox hidden" id="lightbox" onclick="closeLightbox(event)">
        <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
        <img id="lightboxImg" src="" alt="">
    </div>

    <!-- Drag-drop overlay -->
    <div class="drop-overlay hidden" id="dropOverlay">
        <div class="drop-hint">
            <div class="drop-icon">🖼️</div>
            <div>松开鼠标发送图片</div>
        </div>
    </div>

    <script src="/static/js/chat.js"></script>
</body>
</html>
