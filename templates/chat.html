<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Club</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Code highlighting -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <h2>Agent Club</h2>
                <button class="icon-btn" id="menuBtn" title="菜单">☰</button>
            </div>
            <div class="sidebar-menu hidden" id="sidebarMenu">
                <button onclick="showAdminPanel()">管理面板</button>
                <button onclick="handleLogout()">退出登录</button>
            </div>
            <div class="chat-list" id="chatList"></div>
        </aside>

        <!-- Mobile overlay -->
        <div class="overlay hidden" id="overlay" onclick="toggleSidebar()"></div>

        <!-- Main chat area -->
        <main id="mainArea">
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">💬</div>
                <p>选择一个对话开始聊天</p>
            </div>

            <div class="chat-container hidden" id="chatContainer">
                <div class="chat-header" id="chatHeader">
                    <button class="icon-btn mobile-only" onclick="toggleSidebar()">←</button>
                    <div class="chat-header-info">
                        <h3 id="chatTitle"></h3>
                        <span id="chatSubtitle" class="subtitle"></span>
                    </div>
                    <button class="icon-btn" id="chatMembersBtn" onclick="toggleMembers()" title="成员">👥</button>
                </div>

                <div class="messages-area" id="messagesArea">
                    <button class="load-more hidden" id="loadMoreBtn" onclick="loadMoreMessages()">加载更多消息</button>
                    <div id="messageList"></div>
                    <div class="typing-indicator hidden" id="typingIndicator"></div>
                </div>

                <div class="input-area" id="inputArea">
                    <div class="input-toolbar">
                        <label class="icon-btn" title="发送图片/文件">
                            📎 <input type="file" id="fileInput" style="display:none" onchange="handleFileSelect(event)">
                        </label>
                    </div>
                    <div class="input-row">
                        <textarea id="messageInput" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" rows="1"></textarea>
                        <button class="send-btn" onclick="sendMessage()">发送</button>
                    </div>
                </div>
            </div>

            <!-- Members panel -->
            <div class="members-panel hidden" id="membersPanel">
                <div class="members-header">
                    <h3>成员</h3>
                    <button class="icon-btn" onclick="toggleMembers()">✕</button>
                </div>
                <div id="membersList"></div>
            </div>
        </main>
    </div>

    <!-- Admin Modal -->
    <div class="modal hidden" id="adminModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>管理面板</h3>
                <button class="icon-btn" onclick="closeModal('adminModal')">✕</button>
            </div>
            <div class="modal-body">
                <div class="admin-tabs">
                    <button class="active" onclick="switchAdminTab('groups')">群组管理</button>
                    <button onclick="switchAdminTab('agents')">Agent 管理</button>
                </div>

                <div id="adminGroups">
                    <div class="admin-section">
                        <h4>创建群组</h4>
                        <div class="inline-form">
                            <input type="text" id="newGroupName" placeholder="群组名称">
                            <button class="btn-sm" onclick="createGroup()">创建</button>
                        </div>
                    </div>
                    <div class="admin-section">
                        <h4>群组列表</h4>
                        <div id="adminGroupList"></div>
                    </div>
                </div>

                <div id="adminAgents" class="hidden">
                    <div class="admin-section">
                        <h4>创建 Agent</h4>
                        <div class="inline-form">
                            <input type="text" id="newAgentUsername" placeholder="用户名">
                            <input type="text" id="newAgentDisplayName" placeholder="显示名称">
                            <button class="btn-sm" onclick="createAgent()">创建</button>
                        </div>
                    </div>
                    <div class="admin-section">
                        <h4>Agent 列表</h4>
                        <div id="adminAgentList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add member modal -->
    <div class="modal hidden" id="addMemberModal">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h3>添加成员</h3>
                <button class="icon-btn" onclick="closeModal('addMemberModal')">✕</button>
            </div>
            <div class="modal-body">
                <div id="addMemberUserList"></div>
            </div>
        </div>
    </div>

    <script src="/static/js/chat.js"></script>
</body>
</html>
